<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마스터플랜 공간 몰입형 인터랙티브 뷰어 (클리어 렌더 UI)</title>
  <style>
    /* 전체 화면 기본 스타일 리셋 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #141416;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 전체 화면 앱 컨테이너 */
    .app-viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1500px;
    }

    /* ── 🗺️ 1단계 스테이지: 검은 여백을 없애고 프레임에 100% 꽉 채운 조감도 화면 ── */
    .map-stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #141416;
      overflow: hidden;
      transition: transform 1.3s cubic-bezier(0.7, 0, 0.15, 1), 
                  opacity 1s cubic-bezier(0.7, 0, 0.2, 1), 
                  filter 1s ease;
      transform-origin: center center;
      z-index: 1;
    }

    /* 조감도 배경 이미지 - 박스에 빈틈없이 꽉 채우는 프리미엄 커버 정렬 */
    .map-background {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 내부 블러를 제거한 선명한 레이더 핫스팟 경계면 */
    .hotspot-boundary {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: all 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      border: 1.5px solid currentColor;
      background: rgba(255, 255, 255, 0); 
    }

    /* 은은하게 퍼져나가는 고품격 맥박/레이더 파동 모션 */
    .hotspot-boundary::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      box-shadow: 0 0 15px currentColor;
      opacity: 0;
      animation: radarWave 3s infinite cubic-bezier(0.1, 0.8, 0.3, 1);
      pointer-events: none;
    }

    @keyframes radarWave {
      0% { transform: scale(0.96); opacity: 0.7; filter: blur(0px); }
      50% { opacity: 0.3; }
      100% { transform: scale(1.25); opacity: 0; filter: blur(2px); }
    }

    /* 정밀 타겟 조준점 내부 도트 점 */
    .hotspot-boundary::after {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: currentColor;
      box-shadow: 0 0 10px currentColor;
      transition: transform 0.4s ease;
    }

    /* 호버 시 네온 발광 효과 */
    .hotspot-boundary:hover {
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 20px currentColor, 0 0 30px rgba(255, 255, 255, 0.1);
      transform: translate(-50%, -50%) scale(1.04);
    }
    .hotspot-boundary:hover::after { transform: scale(1.5); }

    /* 안내 문구 툴팁 디자인 */
    .hotspot-tooltip {
      position: absolute;
      font-size: 11px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      background: #111115;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      white-space: nowrap;
      transform: translateY(20px);
      z-index: 20;
    }
    .hotspot-boundary:hover .hotspot-tooltip {
      opacity: 1;
      transform: translateY(0);
    }

    /* 꽉 찬 화면 비율에 최적화된 대형 핫스팟 레이더 터치 영역 포지셔닝 고정 */
    .hotspot-boundary.red { left: 36%; top: 68%; width: 25%; height: 25%; color: #ff4757; }
    .hotspot-boundary.green { left: 44%; top: 27%; width: 32%; height: 26%; color: #2ed573; }
    .hotspot-boundary.blue { left: 79%; top: 22%; width: 22%; height: 22%; color: #0097e6; }

    /* 클릭 시 시네마틱 흡입 효과 효과 */
    .map-stage.sucked-in {
      transform: scale(8);
      opacity: 0;
      filter: blur(15px);
      pointer-events: none;
    }

    /* ── 👁️ 2단계 스테이지: 1인칭 전경 화면 ── */
    .perspective-stage {
      position: absolute;
      width: 100vw;
      height: 100vh;
      inset: 0;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.92) translateZ(-100px);
      transition: transform 1.3s cubic-bezier(0.6, 0, 0.15, 1), 
                  opacity 1s cubic-bezier(0.6, 0, 0.2, 1);
    }
    .perspective-stage.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1) translateZ(0);
    }
    .human-view-img {
      width: 100%; height: 100%; object-fit: cover; display: none;
    }
    .human-view-img.active { display: block; }

    /* 상단 정보 패널 뱃지 */
    .info-overlay {
      position: absolute;
      top: 2rem; left: 2rem;
      background: rgba(11, 11, 14, 0.85);
      padding: 14px 24px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-indicator { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 12px currentColor; }
    .location-title { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; }

    /* 탈출(Back) 버튼 */
    .exit-button {
      position: absolute;
      bottom: 3.5rem; left: 50%;
      transform: translateX(-50%);
      background: #ffffff;
      color: #0c0c0e;
      border: none;
      padding: 16px 36px;
      font-size: 14px;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      letter-spacing: 0.5px;
    }
    .exit-button:hover {
      background: #C05A46;
      color: #ffffff;
      transform: translateX(-50%) translateY(-4px);
      box-shadow: 0 25px 50px rgba(192, 90, 70, 0.4);
    }
  </style>
</head>
<body>

  <div class="app-viewport">
    
    <div class="map-stage" id="mapStage">
      <img src="edited-image.png" class="map-background" alt="마스터플랜 조감도 배치도">
      
      <div class="hotspot-boundary red" data-view="view-red" data-title="🔴 RED ZONE — 보행 중심 하단 카운티 가로 전경">
        <span class="hotspot-tooltip" style="top: 115%;">🔴 CLICK TO ENTER RED ZONE</span>
      </div>
      <div class="hotspot-boundary green" data-view="view-green" data-title="🟢 GREEN ZONE — 입체 공공 브릿지 및 중앙 오픈 스페이스">
        <span class="hotspot-tooltip" style="top: 115%;">🟢 CLICK TO ENTER GREEN ZONE</span>
      </div>
      <div class="hotspot-boundary blue" data-view="view-blue" data-title="🔵 BLUE ZONE — 복합 앵커 빌딩 상부 루프탑 커뮤니티 정원">
        <span class="hotspot-tooltip" style="top: -55%;">🔵 CLICK TO ENTER BLUE ZONE</span>
      </div>
    </div>

    <div class="perspective-stage" id="perspectiveStage">
      <div class="info-overlay">
        <div class="status-indicator" id="indicatorLight"></div>
        <div class="location-title" id="locationTitle">현장 시선 데이터 로드 중...</div>
      </div>

      <img src="view-red.png" id="view-red" class="human-view-img" alt="레드 존 전경">
      <img src="view-green.png" id="view-green" class="human-view-img" alt="그린 존 전경">
      <img src="view-blue.png" id="view-blue" class="human-view-img" alt="블루 존 전경">

      <button class="exit-button" onclick="reverseCamera()">← 전체 조감도 배치도로 돌아가기</button>
    </div>

  </div>

  <script>
    const mapStage = document.getElementById('mapStage');
    const perspectiveStage = document.getElementById('perspectiveStage');
    const locationTitle = document.getElementById('locationTitle');
    const indicatorLight = document.getElementById('indicatorLight');

    document.querySelectorAll('.hotspot-boundary').forEach(hotspot => {
      hotspot.addEventListener('click', function(e) {
        const rect = mapStage.getBoundingClientRect();
        const offsetX = e.clientX - rect.left;
        const offsetY = e.clientY - rect.top;
        
        const percentX = (offsetX / rect.width) * 100;
        const percentY = (offsetY / rect.height) * 100;

        mapStage.style.transformOrigin = `${percentX}% ${percentY}%`;
        mapStage.classList.add('sucked-in');

        const targetViewId = this.getAttribute('data-view');
        const targetTitle = this.getAttribute('data-title');
        const targetColor = window.getComputedStyle(this).color;

        document.querySelectorAll('.human-view-img').forEach(img => img.classList.remove('active'));
        
        const targetImg = document.getElementById(targetViewId);
        if (targetImg) targetImg.classList.add('active');

        locationTitle.innerText = targetTitle;
        indicatorLight.style.opacity = "1";
        indicatorLight.style.color = targetColor;

        setTimeout(() => { perspectiveStage.classList.add('active'); }, 180);
      });
    });

    function reverseCamera() {
      perspectiveStage.classList.remove('active');
      setTimeout(() => { mapStage.classList.remove('sucked-in'); }, 250);
    }
  </script>
</body>
</html>
